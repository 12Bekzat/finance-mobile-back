spring.config.import=optional:file:.env[.properties],optional:file:./finance-server/.env[.properties]
spring.application.name=finance
spring.autoconfigure.exclude=org.springframework.boot.security.autoconfigure.UserDetailsServiceAutoConfiguration
server.address=0.0.0.0
server.port=${SERVER_PORT:5455}

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/finance_app}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

security.jwt.secret=${JWT_SECRET:finance-mobile-development-secret-key-change-me-before-production-2026}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:604800000}

google.oauth.allowed-audiences=${GOOGLE_OAUTH_ALLOWED_AUDIENCES:}
openai.api-key=${OPENAI_API_KEY:ollama}
openai.model=${OPENAI_MODEL:qwen3:8b}
openai.base-url=${OPENAI_BASE_URL:http://localhost:11434/v1}
